name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Add registries
        run: |
          julia -e '
            using Pkg
            registries = Set(reg.name for reg in Pkg.Registry.reachable_registries())
            "General" in registries || Pkg.Registry.add(Pkg.RegistrySpec(name="General", url="https://github.com/JuliaRegistries/General.git"))
            "OpenModelica" in registries || Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/OpenModelica/OpenModelicaRegistry"))
          '

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
